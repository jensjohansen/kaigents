apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modelendpoints.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: modelendpoints
    singular: modelendpoint
    kind: ModelEndpoint
    shortNames:
      - kmodel
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                url:
                  type: string
                  description: Direct URL for the model endpoint (optional).
                serviceDns:
                  type: string
                  description: In-cluster service DNS name for endpoint discovery (optional).
                provider:
                  type: string
                  description: Provider identifier (e.g. lemonade).
                capabilities:
                  type: object
                  properties:
                    chat:
                      type: boolean
                    embeddings:
                      type: boolean
                    rerank:
                      type: boolean
                  additionalProperties: false
              additionalProperties: false
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
              additionalProperties: false
