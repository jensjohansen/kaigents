# File: operator/manifests/crds/core.kaigents.io_runs.yaml
# Purpose: Defines the Run CRD manifest used by the operator install path outside the Helm chart.
# Product/business importance: Provides the Kubernetes API schema required to request and track Kaigents run execution.
#
# Copyright (c) 2026 John K Johansen
# License: MIT (see LICENSE)

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runs.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: runs
    singular: run
    kind: Run
    shortNames:
      - kr
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - target
              properties:
                target:
                  type: object
                  required:
                    - kind
                    - name
                  properties:
                    kind:
                      type: string
                      description: Target kind. For v1alpha1 this must be Agent or Team.
                      enum:
                        - Agent
                        - Team
                    name:
                      type: string
                      description: Name of the target resource in the same namespace.
                input:
                  type: string
                  description: Optional input payload for the run.
                modelEndpointRef:
                  type: string
                  description: Optional ModelEndpoint name override for this run.
                modelName:
                  type: string
                  description: Optional OpenAI-compatible model id override for this run.
              additionalProperties: false
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                message:
                  type: string
                artifacts:
                  type: array
                  description: Artifact references produced by this run.
                  items:
                    type: object
                    required:
                      - name
                      - uri
                    properties:
                      name:
                        type: string
                      contentType:
                        type: string
                      uri:
                        type: string
                      sizeBytes:
                        type: integer
                        format: int64
                      sha256:
                        type: string
              additionalProperties: false
