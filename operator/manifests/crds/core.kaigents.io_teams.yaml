apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: teams.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: teams
    singular: team
    kind: Team
    shortNames:
      - ktm
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                agents:
                  type: array
                  description: Agent bindings for this team.
                  items:
                    type: object
                    required:
                      - name
                      - agentRef
                    properties:
                      name:
                        type: string
                        description: Stable binding name within the team.
                      agentRef:
                        type: string
                        description: Name of the referenced Agent resource in the same namespace.
                      systemPromptOverride:
                        type: string
                        description: Optional system prompt override for this team binding.
                      contextPrompt:
                        type: string
                        description: Optional additional context prompt for this team binding.
              additionalProperties: false
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
              additionalProperties: false
