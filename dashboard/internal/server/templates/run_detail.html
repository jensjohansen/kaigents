{{ define "content" }}
<h1 class="mb-4">Run: {{ .Run.Name }}</h1>
<div class="row">
    <div class="col-md-4">
        <div class="card p-3 mb-4">
            <h5>Status</h5>
            <p><strong>Phase:</strong> <span class="badge {{ if eq .Run.Status.Phase "Succeeded" }}bg-success{{ else if eq .Run.Status.Phase "Failed" }}bg-danger{{ else }}bg-info{{ end }}">{{ .Run.Status.Phase }}</span></p>
            <p><strong>Target:</strong> {{ .Run.Spec.Target.Kind }}/{{ .Run.Spec.Target.Name }}</p>
            <p><strong>Started:</strong> {{ .Run.CreationTimestamp }}</p>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card p-3 mb-4">
            <h5>Input</h5>
            <pre class="bg-light p-2">{{ .Run.Spec.Input }}</pre>
        </div>
    </div>
</div>

<div class="card p-3">
    <h5>Timeline / Events</h5>
    <div id="timeline">
        <p class="text-muted">Loading live status from execution engine...</p>
    </div>
</div>
