# File: charts/kaigents-operator/templates/runner-serviceaccount.yaml
# Purpose: Renders the ServiceAccount used by Kaigents runner jobs launched by the operator.
# Product/business importance: Provides the runtime identity for execution jobs in Kubernetes.
#
# Copyright (c) 2026 John K Johansen
# License: MIT (see LICENSE)

{{- if .Values.runnerServiceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.runnerServiceAccount.name }}
  labels:
    app.kubernetes.io/name: {{ include "kaigents-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- if .Values.imagePullSecrets }}
imagePullSecrets:
{{- toYaml .Values.imagePullSecrets | nindent 2 }}
{{- end }}
{{- end -}}
