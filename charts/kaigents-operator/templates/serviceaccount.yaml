# File: charts/kaigents-operator/templates/serviceaccount.yaml
# Purpose: Renders the ServiceAccount used by the Kaigents operator controller deployment.
# Product/business importance: Provides the control-plane identity required for reconciling Kaigents resources in Kubernetes.
#
# Copyright (c) 2026 John K Johansen
# License: MIT (see LICENSE)

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kaigents-operator.serviceAccountName" . }}
  labels:
    app.kubernetes.io/name: {{ include "kaigents-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- if .Values.imagePullSecrets }}
imagePullSecrets:
{{- toYaml .Values.imagePullSecrets | nindent 2 }}
{{- end }}
{{- end -}}
