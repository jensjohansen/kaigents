apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
    shortNames:
      - ka
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                runtime:
                  type: string
                  description: Runtime identifier (runtime-agnostic). Optional in v1alpha1.
                systemPrompt:
                  type: string
                  description: Base system prompt for this agent.
                modelEndpointRef:
                  type: string
                  description: Optional ModelEndpoint name used as the default for runs targeting this agent.
                modelName:
                  type: string
                  description: Optional OpenAI-compatible model id used as the default for runs targeting this agent.
                tools:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string

