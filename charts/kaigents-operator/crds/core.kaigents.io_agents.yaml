# File: operator/manifests/crds/core.kaigents.io_agents.yaml
# Purpose: Defines the Agent CRD manifest used by the operator install path outside the Helm chart.
# Product/business importance: Provides the Kubernetes API schema required to model runnable Kaigents agents.
#
# Copyright (c) 2026 John K Johansen
# License: MIT (see LICENSE)

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
    shortNames:
      - ka
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                runtime:
                  type: string
                  description: Runtime identifier (runtime-agnostic). Optional in v1alpha1.
                systemPrompt:
                  type: string
                  description: Base system prompt for this agent.
                modelEndpointRef:
                  type: string
                  description: Optional ModelEndpoint name used as the default for runs targeting this agent.
                modelName:
                  type: string
                  description: Optional OpenAI-compatible model id used as the default for runs targeting this agent.
                tools:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                allowedTools:
                  type: array
                  description: Explicit allowlist of tool names permitted at invocation time. If non-empty, any tool not in this list will block execution and set the Run to Failed.
                  items:
                    type: string
                routing:
                  type: object
                  properties:
                    computeResource:
                      type: string
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
