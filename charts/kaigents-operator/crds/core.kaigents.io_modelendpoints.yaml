# File: charts/kaigents-operator/crds/core.kaigents.io_modelendpoints.yaml
# Purpose: Defines the ModelEndpoint custom resource schema packaged with the Kaigents operator Helm chart.
# Product/business importance: Ensures operator installs the API for describing model-serving backends used by Kaigents runs.
#
# Copyright (c) 2026 John K Johansen
# License: MIT (see LICENSE)

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modelendpoints.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: modelendpoints
    singular: modelendpoint
    kind: ModelEndpoint
    shortNames:
      - kmodel
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                url:
                  type: string
                  description: Direct URL for the model endpoint (optional).
                serviceDns:
                  type: string
                  description: In-cluster service DNS name for endpoint discovery (optional).
                model:
                  type: string
                  description: OpenAI-compatible model id served by this endpoint (optional).
                provider:
                  type: string
                  description: Provider identifier (e.g. lemonade).
                capabilities:
                  type: object
                  properties:
                    chat:
                      type: boolean
                    embeddings:
                      type: boolean
                    rerank:
                      type: boolean
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string

