apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: processes.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: processes
    singular: process
    kind: Process
    shortNames:
      - kp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - steps
              properties:
                steps:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - name
                      - taskRef
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      taskRef:
                        type: string
                maxReworkAttempts:
                  type: integer
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
