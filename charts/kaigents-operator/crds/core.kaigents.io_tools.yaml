# File: charts/kaigents-operator/crds/core.kaigents.io_tools.yaml
# Purpose: Defines the Tool custom resource schema packaged with the Kaigents operator Helm chart.
# Product/business importance: Ensures operator installs the API for modeling tool capabilities available to Kaigents agents.
#
# Copyright (c) 2026 John K Johansen
# License: MIT (see LICENSE)

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tools.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: tools
    singular: tool
    kind: Tool
    shortNames:
      - ktool
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                mcpServerRef:
                  type: string
                  description: Name of the referenced MCPServer resource in the same namespace.
                toolName:
                  type: string
                  description: Tool name as exposed by the MCP server.
                description:
                  type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string

