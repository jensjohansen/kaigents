# File: charts/kaigents-operator/crds/core.kaigents.io_mcpservers.yaml
# Purpose: Defines the MCPServer custom resource schema packaged with the Kaigents operator Helm chart.
# Product/business importance: Ensures operator installs the API for modeling tool server integrations used during agent execution.
#
# Copyright (c) 2026 John K Johansen
# License: MIT (see LICENSE)

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpservers.core.kaigents.io
spec:
  group: core.kaigents.io
  scope: Namespaced
  names:
    plural: mcpservers
    singular: mcpserver
    kind: MCPServer
    shortNames:
      - kmcp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                url:
                  type: string
                  description: Direct URL for an MCP server endpoint (optional).
                kmcpName:
                  type: string
                  description: Name of a kmcp-managed MCP server resource (integration reference).
                transport:
                  type: string
                  description: Transport identifier (e.g. http, stdio). Optional in v1alpha1.
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string

