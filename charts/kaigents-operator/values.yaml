# File: charts/kaigents-operator/values.yaml
# Purpose: Defines default configuration values for deploying the Kaigents operator Helm chart.
# Product/business importance: Provides the source-controlled deployment defaults used to install and operate the Kaigents control plane.
#
# Copyright (c) 2026 John K Johansen
# License: MIT (see LICENSE)

replicaCount: 1

image:
  repository: ghcr.io/kaigents/kaigents-operator
  pullPolicy: IfNotPresent
  tag: ""

runnerImage:
  repository: ghcr.io/kaigents/kaigents-runner
  pullPolicy: IfNotPresent
  tag: ""

temporalAdapter:
  url: "http://kaigents-temporal-adapter.kaigents.svc.cluster.local:8080"

runnerEnv:
  []

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

runnerServiceAccount:
  create: true
  name: kaigents-runner

rbac:
  create: true

userRoles:
  create: true

leaderElection:
  enabled: false

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
